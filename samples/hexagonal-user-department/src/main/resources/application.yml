spring:
  datasource:
    url: jdbc:h2:mem:hexagonal-sample;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

time:
  timezone: Asia/Seoul

jwt:
  secret: sample-secret-key-that-is-at-least-32-characters-long
  access-expiration: 3600000
  refresh-expiration: 604800000

cors:
  allowed-origins:
    - http://localhost:3000

security:
  public-endpoints:
    - /api/public/**
    - /h2-console/**
  system-user-id: 0
